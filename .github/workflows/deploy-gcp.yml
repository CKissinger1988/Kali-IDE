name: Build and Deploy Sovereign Core to GCP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and Push Container
        run: |
          IMAGE_TAG="gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-supreme-sovereign-core:${{ github.sha }}"
          IMAGE_LATEST="gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-supreme-sovereign-core:latest"
          docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ai-supreme-sovereign-core
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-supreme-sovereign-core:latest
          region: us-central1
          flags: --allow-unauthenticated
